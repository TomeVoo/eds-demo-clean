<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>EDS – System Doboru Badań</title>

  <!-- ✅ POPRAWNA ŚCIEŻKA DO CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="app-header">
  <h1>EDS – System Doboru Badań</h1>
</header>
<!-- Formularz danych osoby -->
<div style="padding: 16px; border-bottom: 1px solid #ddd;">
  <label for="ageInput"><strong>Wiek pracownika:</strong></label><br>
  <input
    id="ageInput"
    type="number"
    min="0"
    placeholder="np. 45"
    style="margin-top:6px; padding:6px; width:120px;"
  />
</div>

<div class="app-container">
  <aside class="sidebar">
    <h2>Narażenia</h2>
    <ul id="exposuresList"></ul>
  </aside>

  <main class="details">
    <div id="detailsContent">Wybierz narażenie</div>
  </main>
</div>

<!-- ✅ POPRAWNA ŚCIEŻKA DO JS -->
<script src="app.js"></script>

</body>
</html>
